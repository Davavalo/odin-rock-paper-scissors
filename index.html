<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="page">
      <div class="game">
        <div class="game-container">
          <h1 id="round-winner">Make a choice.</h1>
          <p id="player-score">Player Score: 0</p>
          <p id="computer-score">Computer Score: 0</p>
          <p id="player-choice">Player Choice: ?</p>
          <p id="computer-choice">Computer Choice: ?</p>
        </div>
        <div class="buttons-container">
          <button id="rock-btn">Rock</button>
          <button id="paper-btn">Paper</button>
          <button id="scissor-btn">Scissors</button>
        </div>
      </div>
    </div>
  </body>
  <script src="/script.js"></script>
</html>
